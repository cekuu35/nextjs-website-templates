name: Request a website niche
description: Tell us which client-site starting point would be useful for an upcoming build.
title: "[Niche request]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing the direction you need. This is product feedback, not a purchase commitment. Please avoid posting private client information.
  - type: input
    id: niche
    attributes:
      label: Website niche
      description: What industry or client type should the starting point serve?
      placeholder: e.g. architecture studio, veterinary clinic, B2B logistics
    validations:
      required: true
  - type: dropdown
    id: use_case
    attributes:
      label: Main use case
      options:
        - Client pitch or visual direction
        - Client marketing-site build
        - Freelance portfolio project
        - Internal concept or prototype
        - Other
    validations:
      required: true
  - type: textarea
    id: pages
    attributes:
      label: Essential pages or flows
      description: List the pages or demo flows that would make the starting point useful.
      placeholder: Home, services, case studies, quote request...
    validations:
      required: true
  - type: textarea
    id: stack_notes
    attributes:
      label: Optional stack or design notes
      description: Share any relevant Next.js, Tailwind, CMS, animation, or visual-direction preferences.
  - type: checkboxes
    id: public_info
    attributes:
      label: Public-information check
      options:
        - label: I have not included private client information or confidential brief details.
          required: true
